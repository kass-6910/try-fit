services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tryfit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tryfit}
      POSTGRES_DB: ${POSTGRES_DB:-tryfit}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tryfit} -d ${POSTGRES_DB:-tryfit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-tryfit}:${POSTGRES_PASSWORD:-tryfit}@db:5432/${POSTGRES_DB:-tryfit}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:3001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
